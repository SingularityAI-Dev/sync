<svg viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171c2f"/>
      <stop offset="1" stop-color="#10131f"/>
    </linearGradient>
    <linearGradient id="hm-guard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e07050"/>
      <stop offset="1" stop-color="#e0a050"/>
    </linearGradient>
    <filter id="hm-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl{fill:#e7e9f2;font-weight:600}
      .sub{fill:#9aa0b4;font-size:12px}
      .tag{fill:#7c6fe0;font-size:11px;font-weight:700;letter-spacing:.06em}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,monospace}
      .card{opacity:0;animation:hm-rise .6s ease forwards}
      .c1{animation-delay:1.3s}.c2{animation-delay:1.55s}.c3{animation-delay:1.8s}
      @keyframes hm-rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      .pulse{animation:hm-pulse 3s ease-in-out infinite}
      @keyframes hm-pulse{0%,100%{opacity:.55}50%{opacity:1}}
    </style>
  </defs>

  <rect width="880" height="380" rx="16" fill="url(#hm-bg)"/>
  <text x="32" y="42" class="tag">STEP 1 · ARCHITECTURE DETECTION</text>
  <text x="32" y="66" class="lbl" font-size="18">One command. It reads where it is before it writes anything.</text>

  <!-- cwd entry -->
  <g>
    <rect x="32" y="108" width="150" height="62" rx="10" fill="#1e2540" stroke="#2c3457"/>
    <text x="48" y="134" class="sub mono">$ /sync</text>
    <text x="48" y="155" class="sub" font-size="11">in current dir</text>
  </g>

  <!-- hard guard -->
  <g>
    <rect x="222" y="100" width="170" height="78" rx="12" fill="#241a22" stroke="#e07050" stroke-opacity=".7"/>
    <rect x="222" y="100" width="6" height="78" rx="3" fill="url(#hm-guard)"/>
    <text x="244" y="128" class="lbl" font-size="14">Hard guard</text>
    <text x="244" y="148" class="sub" font-size="11">refuse at $HOME, /, root,</text>
    <text x="244" y="164" class="sub" font-size="11">no project signal → write nothing</text>
  </g>

  <!-- router -->
  <g>
    <circle cx="470" cy="139" r="30" fill="#1c2238" stroke="#7c6fe0" class="pulse" filter="url(#hm-soft)"/>
    <text x="470" y="135" text-anchor="middle" class="lbl" font-size="12">detect</text>
    <text x="470" y="150" text-anchor="middle" class="sub" font-size="10">mode</text>
  </g>

  <!-- connectors -->
  <path d="M182 139 H222" stroke="#3a4267" stroke-width="2"/>
  <path d="M392 139 H440" stroke="#3a4267" stroke-width="2"/>
  <path d="M500 139 C 558 139 558 232 596 232" fill="none" stroke="#2db88a" stroke-width="2" stroke-opacity=".6"/>
  <path d="M500 139 H596" fill="none" stroke="#7c6fe0" stroke-width="2" stroke-opacity=".6"/>
  <path d="M500 139 C 558 139 558 318 596 318" fill="none" stroke="#e0a050" stroke-width="2" stroke-opacity=".6"/>

  <!-- traveling pulse -->
  <circle r="4.5" fill="#7c6fe0">
    <animateMotion dur="2.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" path="M182 139 H222 M392 139 H440"/>
  </circle>
  <circle r="4" fill="#7c6fe0">
    <animateMotion dur="2.6s" begin="1s" repeatCount="indefinite" path="M500 139 H596"/>
  </circle>

  <!-- mode cards -->
  <g class="card c1">
    <rect x="596" y="86" width="252" height="56" rx="10" fill="#1a2238" stroke="#7c6fe0" stroke-opacity=".8"/>
    <circle cx="618" cy="114" r="5" fill="#7c6fe0"/>
    <text x="636" y="110" class="lbl" font-size="13">Project mode</text>
    <text x="636" y="128" class="sub" font-size="10">CHANGELOG · STATUS · brain.md</text>
  </g>
  <g class="card c2">
    <rect x="596" y="204" width="252" height="56" rx="10" fill="#16271f" stroke="#2db88a" stroke-opacity=".8"/>
    <circle cx="618" cy="232" r="5" fill="#2db88a"/>
    <text x="636" y="228" class="lbl" font-size="13">Vault mode</text>
    <text x="636" y="246" class="sub" font-size="10">append daily/ · SOUL &amp; USER safe</text>
  </g>
  <g class="card c3">
    <rect x="596" y="290" width="252" height="56" rx="10" fill="#26221a" stroke="#e0a050" stroke-opacity=".8"/>
    <circle cx="618" cy="318" r="5" fill="#e0a050"/>
    <text x="636" y="314" class="lbl" font-size="13">Orchestrator mode</text>
    <text x="636" y="332" class="sub" font-size="10">own log only · child vaults safe</text>
  </g>

  <text x="32" y="350" class="sub" font-size="11.5">Read first · classify · skip files that don't need changes. A sync that writes nothing is still a success.</text>
</svg>
