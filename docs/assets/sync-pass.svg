<svg viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171c2f"/>
      <stop offset="1" stop-color="#10131f"/>
    </linearGradient>
    <filter id="sp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl{fill:#e7e9f2;font-weight:600}
      .sub{fill:#9aa0b4}
      .tag{fill:#7c6fe0;font-size:11px;font-weight:700;letter-spacing:.06em}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,monospace}
      .write{animation:sp-lit 4s ease-in-out infinite}
      @keyframes sp-lit{0%,18%{opacity:.45}30%,70%{opacity:1}100%{opacity:.45}}
      .skip{opacity:.32}
      .flow{stroke-dasharray:5 7;animation:sp-dash 1.1s linear infinite}
      @keyframes sp-dash{to{stroke-dashoffset:-24}}
    </style>
  </defs>

  <rect width="880" height="440" rx="16" fill="url(#sp-bg)"/>
  <text x="32" y="40" class="tag">THE SYNC PASS · PROJECT MODE</text>
  <text x="32" y="64" class="lbl" font-size="18">Selective writes. Only files with a real candidate get touched.</text>

  <!-- sources -->
  <g>
    <rect x="32" y="110" width="172" height="210" rx="12" fill="#1b2138" stroke="#2c3457"/>
    <text x="48" y="138" class="lbl" font-size="13">Ground truth</text>
    <text x="48" y="166" class="sub mono" font-size="11">conversation</text>
    <text x="48" y="190" class="sub mono" font-size="11">git log --oneline</text>
    <text x="48" y="214" class="sub mono" font-size="11">git status --short</text>
    <text x="48" y="238" class="sub mono" font-size="11">existing state files</text>
    <text x="48" y="262" class="sub mono" font-size="11">pre-compaction notes</text>
    <text x="48" y="296" class="sub" font-size="11" font-style="italic">read in parallel</text>
  </g>

  <!-- classifier -->
  <g filter="url(#sp-glow)">
    <rect x="266" y="158" width="150" height="114" rx="14" fill="#1c2238" stroke="#7c6fe0"/>
    <text x="341" y="206" text-anchor="middle" class="lbl" font-size="14">classify</text>
    <text x="341" y="226" text-anchor="middle" class="sub" font-size="11">tag each signal</text>
    <text x="341" y="244" text-anchor="middle" class="sub" font-size="11">by half-life</text>
  </g>
  <path d="M204 215 H266" stroke="#7c6fe0" stroke-width="2" class="flow" fill="none"/>

  <!-- routes -->
  <g stroke-width="2" fill="none">
    <path d="M416 188 C 480 188 480 134 556 134" stroke="#2db88a" class="flow"/>
    <path d="M416 205 C 480 205 480 196 556 196" stroke="#7c6fe0" class="flow"/>
    <path d="M416 222 C 480 222 480 258 556 258" stroke="#7c6fe0" class="flow"/>
    <path d="M416 245 C 480 245 480 320 556 320" stroke="#e0a050" stroke-opacity=".5" stroke-dasharray="4 6"/>
  </g>

  <!-- artifact targets -->
  <g class="write">
    <rect x="556" y="110" width="292" height="48" rx="9" fill="#16271f" stroke="#2db88a"/>
    <text x="574" y="132" class="lbl" font-size="13">CHANGELOG.md</text>
    <text x="574" y="149" class="sub" font-size="10.5">shipped change → prepend one line · cap 20</text>
  </g>
  <g class="write" style="animation-delay:.5s">
    <rect x="556" y="172" width="292" height="48" rx="9" fill="#1a2238" stroke="#7c6fe0"/>
    <text x="574" y="194" class="lbl" font-size="13">brain.md  +  MEMORY.md index</text>
    <text x="574" y="211" class="sub" font-size="10.5">active task, assets, decisions → auto-wired</text>
  </g>
  <g class="write" style="animation-delay:.9s">
    <rect x="556" y="234" width="292" height="48" rx="9" fill="#1a2238" stroke="#7c6fe0"/>
    <text x="574" y="256" class="lbl" font-size="13">typed memory  feedback_* project_*</text>
    <text x="574" y="273" class="sub" font-size="10.5">durable truths → one file each, indexed</text>
  </g>
  <g class="skip">
    <rect x="556" y="296" width="292" height="48" rx="9" fill="#1c2030" stroke="#3a4267" stroke-dasharray="5 5"/>
    <text x="574" y="318" class="lbl" font-size="13" fill="#9aa0b4">STATUS.md</text>
    <text x="574" y="335" class="sub" font-size="10.5">no candidate this pass → skipped, unchanged</text>
  </g>

  <!-- dispatch -->
  <g>
    <rect x="556" y="362" width="292" height="50" rx="9" fill="#231c2e" stroke="#a679e0" stroke-opacity=".8"/>
    <text x="574" y="384" class="lbl" font-size="13">Second_Brain dispatch</text>
    <text x="574" y="401" class="sub" font-size="10.5">one line → daily/ + Active Projects · state compounds</text>
  </g>
  <path d="M341 272 C 341 388 460 388 556 388" stroke="#a679e0" stroke-width="2" class="flow" fill="none" stroke-opacity=".7"/>

  <text x="32" y="354" class="sub" font-size="11">brain.md = "now"</text>
  <text x="32" y="372" class="sub" font-size="11">typed = "durable"</text>
  <text x="32" y="398" class="sub" font-size="11">Snapshot files replaced;</text>
  <text x="32" y="414" class="sub" font-size="11">logs appended. Never fabricate.</text>
</svg>
