<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171c2f"/>
      <stop offset="1" stop-color="#10131f"/>
    </linearGradient>
    <filter id="ca-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl{fill:#e7e9f2;font-weight:600}
      .sub{fill:#9aa0b4}
      .tag{fill:#7c6fe0;font-size:11px;font-weight:700;letter-spacing:.06em}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,monospace}
      .chip{opacity:0;animation:ca-in .5s ease forwards}
      .flow{stroke-dasharray:5 7;animation:ca-dash 1.1s linear infinite}
      @keyframes ca-dash{to{stroke-dashoffset:-24}}
      @keyframes ca-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
      .vk{animation:ca-pulseG 3.2s ease-in-out infinite}
      @keyframes ca-pulseG{0%,100%{opacity:.6}50%{opacity:1}}
    </style>
  </defs>

  <rect width="880" height="470" rx="16" fill="url(#ca-bg)"/>
  <text x="32" y="40" class="tag">STEP 1c · CONTEXT AUDIT PRE-RUN</text>
  <text x="32" y="64" class="lbl" font-size="18">See what this project loads into the window. Trim what is wasted here.</text>

  <!-- discover chips -->
  <g class="chip" style="animation-delay:.2s"><rect x="32" y="98" width="150" height="34" rx="8" fill="#1b2138" stroke="#2c3457"/><text x="48" y="120" class="sub mono" font-size="11">MCP servers</text></g>
  <g class="chip" style="animation-delay:.35s"><rect x="32" y="142" width="150" height="34" rx="8" fill="#1b2138" stroke="#2c3457"/><text x="48" y="164" class="sub mono" font-size="11">plugins</text></g>
  <g class="chip" style="animation-delay:.5s"><rect x="32" y="186" width="150" height="34" rx="8" fill="#1b2138" stroke="#2c3457"/><text x="48" y="208" class="sub mono" font-size="11">hooks</text></g>
  <g class="chip" style="animation-delay:.65s"><rect x="32" y="230" width="150" height="34" rx="8" fill="#1b2138" stroke="#2c3457"/><text x="48" y="252" class="sub mono" font-size="11">auto-memory</text></g>
  <text x="32" y="284" class="sub" font-size="11">discover · derive from $HOME + path</text>

  <!-- arrows into engine -->
  <g stroke="#3a4267" stroke-width="2" fill="none" class="flow">
    <path d="M182 115 C 220 115 220 185 262 185"/>
    <path d="M182 159 C 220 159 220 185 262 185"/>
    <path d="M182 203 H262"/>
    <path d="M182 247 C 220 247 220 200 262 200"/>
  </g>

  <!-- engine -->
  <g filter="url(#ca-glow)">
    <rect x="262" y="138" width="168" height="124" rx="14" fill="#1c2238" stroke="#7c6fe0"/>
    <text x="346" y="172" text-anchor="middle" class="lbl" font-size="14">classify</text>
    <text x="346" y="194" text-anchor="middle" class="sub" font-size="10.5">value-earning · domain</text>
    <text x="346" y="210" text-anchor="middle" class="sub" font-size="10.5">infra · unknown</text>
    <text x="346" y="234" text-anchor="middle" class="sub mono" font-size="10">+ estimate tokens</text>
    <text x="346" y="251" text-anchor="middle" class="sub" font-size="10" font-style="italic">config = only tuning surface</text>
  </g>

  <!-- verdict + tier outputs -->
  <path d="M430 178 C 480 178 480 138 530 138" stroke="#2db88a" stroke-width="2" fill="none" class="flow"/>
  <path d="M430 200 C 480 200 480 214 530 214" stroke="#e07050" stroke-width="2" fill="none" class="flow"/>
  <path d="M430 222 C 480 222 480 286 530 286" stroke="#3a4267" stroke-width="2" fill="none"/>

  <g>
    <rect x="530" y="112" width="318" height="52" rx="9" fill="#16271f" stroke="#2db88a"/>
    <text x="548" y="134" class="lbl" font-size="12.5">auto-safe → apply on confirm</text>
    <text x="548" y="152" class="sub" font-size="10.5">memory prune · project .mcp.json → disabledMcpjsonServers</text>
  </g>
  <g>
    <rect x="530" y="188" width="318" height="52" rx="9" fill="#241a18" stroke="#e07050"/>
    <text x="548" y="210" class="lbl" font-size="12.5">recommend → exact command, no edit</text>
    <text x="548" y="228" class="sub mono" font-size="10">claude mcp remove &lt;name&gt; -s user</text>
  </g>
  <g>
    <rect x="530" y="262" width="318" height="48" rx="9" fill="#1c2030" stroke="#3a4267"/>
    <text x="548" y="284" class="lbl" font-size="12.5" fill="#9aa0b4">none → keep</text>
    <text x="548" y="301" class="sub" font-size="10.5">infra never flagged · unknown stays uncertain</text>
  </g>

  <!-- jcodemunch proof -->
  <rect x="32" y="330" width="816" height="116" rx="12" fill="#141a2c" stroke="#2c3457"/>
  <text x="52" y="358" class="tag" fill="#a679e0">THE jcodemunch PROOF · same server, opposite verdict</text>

  <g class="vk">
    <rect x="52" y="372" width="384" height="56" rx="9" fill="#16271f" stroke="#2db88a"/>
  </g>
  <circle cx="78" cy="400" r="6" fill="#2db88a"/>
  <text x="96" y="396" class="lbl" font-size="12.5">code project</text>
  <text x="96" y="414" class="sub" font-size="11">value-earning, reduces net context → <tspan fill="#2db88a" font-weight="700">kept</tspan></text>

  <g class="vk" style="animation-delay:1.1s">
    <rect x="444" y="372" width="384" height="56" rx="9" fill="#241a18" stroke="#e07050"/>
  </g>
  <circle cx="470" cy="400" r="6" fill="#e07050"/>
  <text x="488" y="396" class="lbl" font-size="12.5">docs vault</text>
  <text x="488" y="414" class="sub" font-size="11">no code to analyze → <tspan fill="#e07050" font-weight="700">flagged</tspan> with exact removal command</text>
</svg>
